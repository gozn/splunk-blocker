# SOC-Portal Nginx Configuration
# Optimized for Splunk JSON Ingestion

pid /opt/nginx-logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Custom log format encoding Nginx variables into structured JSON.
    # Splunk will automatically extract all these fields on ingestion without regex.
    log_format splunk_json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"http_protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"soc_event_type":"$http_x_soc_event"'
    '}';

    # Write logs to standard files under the logs/ directory
    access_log /opt/nginx-logs/access.log splunk_json;
    error_log /opt/nginx-logs/error.log warn;

    server {
        listen 4567;
        server_name localhost;

        # Directory containing static assets (index.html, style.css, app.js)
        root /home/tritc/Desktop/splunk-blocker/public;
        index index.html;

        # Serve static assets directly
        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy to Flask Web GUI Dashboard
        location /dashboard/ {
            proxy_pass http://127.0.0.1:6666/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Flask active blocks JSON endpoint
        location /active-blocks {
            proxy_pass http://127.0.0.1:6666/active-blocks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Flask violations JSON endpoint
        location /violations {
            proxy_pass http://127.0.0.1:6666/violations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Flask IP block history endpoint
        location /history/ {
            proxy_pass http://127.0.0.1:6666/history/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Flask unblock endpoint
        location /unblock/ {
            proxy_pass http://127.0.0.1:6666/unblock/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Flask webhook endpoint
        location /webhook {
            proxy_pass http://127.0.0.1:6666/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Mock API routes designed to return JSON status codes.
        # These endpoints don't exist as physical files, but Nginx will process
        # the requests, return a clean JSON error response, and output the log
        # to access.log using our splunk_json format.
        location /api/ {
            default_type application/json;
            
            # Allow CORS for easy testing
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Requested-With, X-SOC-Event';

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Return custom HTTP statuses to make Splunk logging realistic
            if ($request_uri ~* "critical-alert") {
                return 500 '{"status": "error", "message": "CRITICAL_EVENT_FIRED", "code": 500}';
            }
            if ($request_uri ~* "simulate-intrusion") {
                return 403 '{"status": "warning", "message": "INTRUSION_SIMULATION_DETECTED", "code": 403}';
            }
            if ($request_uri ~* "diagnostics") {
                return 200 '{"status": "success", "message": "DIAGNOSTICS_COMPLETED", "code": 200}';
            }
            if ($request_uri ~* "audit") {
                return 200 '{"status": "success", "message": "AUDIT_RECORDED", "code": 200}';
            }

            # Default fallback for other mock API routes
            return 404 '{"status": "not_found", "message": "Mock route not matched", "code": 404}';
        }
    }
}
