services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./logs/alerts:/var/log/splunk-blocker
    expose:
      - "6666"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-4567}:4567"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
